reports_dir: ./reports
enable_drive: true
enable_gemini_logs: true
enable_perplexity_logs: true

# Path to a Google OAuth 2.0 client secrets JSON.
google_credentials_path: /absolute/path/to/client_secret.json

default_start_offset_days: 1
default_end_offset_days: 0

# Minutes of inactivity that define a new session
session_gap_minutes: 30

# IANA timezone name for report timestamps. Default: UTC
# Examples: Europe/Amsterdam, America/New_York, Asia/Tokyo
timezone: Europe/Amsterdam

# Path where the OAuth 2.0 refreshable token will be saved.
token_path: token.json

connectors:
  # Paths to local JSONL files storing the history of LLM prompts and citations
  gemini_log_path: ~/.personal-summarizer/gemini_history.json
  perplexity_log_path: ~/.personal-summarizer/perplexity_history.json
