<!DOCTYPE html>
<html>
<head>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
<script>
  // These values are injected server-side via scriptlets
  const oauthToken = '<?= oauthToken ?>';
  const developerKey = '<?= developerKey ?>';

  function onApiLoad() {
    gapi.load('picker', onPickerApiLoad);
  }

  function onPickerApiLoad() {
    if (!oauthToken || !developerKey) {
      document.body.innerHTML = 
        '<p style="color:red">Error: missing credentials</p>';
      return;
    }

    const myDriveView = new google.picker.DocsView()
      .setIncludeFolders(true)
      .setSelectFolderEnabled(true)
      .setMimeTypes('application/vnd.google-apps.folder')
      .setMode(google.picker.DocsViewMode.LIST);

    const sharedDriveView = new google.picker.DocsView()
      .setIncludeFolders(true)
      .setSelectFolderEnabled(true)
      .setMimeTypes('application/vnd.google-apps.folder')
      .setEnableDrives(true)
      .setMode(google.picker.DocsViewMode.LIST);

    const picker = new google.picker.PickerBuilder()
      .addView(myDriveView)
      .addView(sharedDriveView)
      .setOAuthToken(oauthToken)
      .setDeveloperKey(developerKey)
      .setCallback(pickerCallback)
      .enableFeature(google.picker.Feature.SUPPORT_DRIVES)
      .setOrigin('https://docs.google.com')
      .setTitle('Select a folder to scan')
      .build();

    picker.setVisible(true);
  }

  function pickerCallback(data) {
    if (data.action === google.picker.Action.PICKED) {
      const folder = data.docs[0];
      // Send result back to parent sidebar
      google.script.run
        .withSuccessHandler(function() {
          google.script.host.close();
        })
        .setSelectedFolder(folder.id, folder.name);
    } else if (data.action === google.picker.Action.CANCEL) {
      google.script.host.close();
    }
  }

  // Auto-initialize when page loads
  window.onload = onApiLoad;
</script>
</body>
</html>
