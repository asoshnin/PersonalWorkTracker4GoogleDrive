<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= HtmlService.createHtmlOutputFromFile('Stylesheet').getContent(); ?>
  </head>
  <body>
    <div class="sidebar-container">
      <div class="header">
        <h1 class="title">📋 PA Assistant</h1>
        <div class="subtitle" id="timezoneLabel">Loading timezone...</div>
      </div>

      <div class="section" id="generateSection">
        <label for="period">Period</label>
        <select id="period" class="full-width">
          <option value="24h" selected>Last 24 hours</option>
          <option value="7d">Last 7 days</option>
          <option value="this-week">This week</option>
          <option value="last-week">Last week</option>
        </select>

        <label>Scan scope</label>
        <div class="radio-group" style="margin-bottom: 15px;">
          <div>
            <input type="radio" id="scope_my_drive" name="scanScope" value="my_drive" checked onchange="togglePickerUI()">
            <label for="scope_my_drive" style="display:inline; margin-left:4px; font-weight:normal;">My Drive only</label>
          </div>
          <div style="margin-top:4px;">
            <input type="radio" id="scope_all_drives" name="scanScope" value="all_drives" onchange="togglePickerUI()">
            <label for="scope_all_drives" style="display:inline; margin-left:4px; font-weight:normal;">All Drives incl. Shared</label>
          </div>
          <div style="margin-top:4px;">
            <input type="radio" id="scope_specific" name="scanScope" value="specific_folder" onchange="togglePickerUI()">
            <label for="scope_specific" style="display:inline; margin-left:4px; font-weight:normal;">Specific folder</label>
          </div>
        </div>

        <div id="pickerSection" class="hidden" style="margin-bottom: 15px;">
          <button id="chooseFolderBtn" class="btn-secondary" onclick="openPickerInit()">📁 Choose Folder</button>
          <div id="selectedFolderText" style="margin-top: 8px; font-size: 13px; color: #1a73e8; font-weight: 500;"></div>
        </div>

        <label for="outputFormat">Output</label>
        <select id="outputFormat" class="full-width">
          <option value="sheet_only" selected>Sheet only</option>
          <option value="sheet_and_doc">Sheet + Doc</option>
        </select>

        <label for="sessionGap">Session gap</label>
        <select id="sessionGap" class="full-width">
          <option value="15">15 minutes</option>
          <option value="30" selected>30 minutes</option>
          <option value="60">60 minutes</option>
          <option value="120">2 hours</option>
        </select>

        <button id="generateBtn" class="btn-primary" onclick="generateReport()">▶ Generate Report</button>
      </div>

      <div id="loadingState" class="state-container hidden">
        <div class="spinner"></div>
        <p>Fetching your Drive activity...</p>
      </div>

      <div id="successState" class="state-container hidden">
        <div class="success-icon">✓</div>
        <p class="success-text">Report ready!</p>
      </div>
      
      <div id="errorState" class="state-container hidden">
        <p id="errorMsg" class="error-text"></p>
      </div>

      <div class="section hidden" id="lastReportSection">
        <hr class="divider">
        <h3 class="section-title">Last Report</h3>
        <button id="openDocBtn" class="btn-secondary" onclick="openDoc()">📄 Open Last Report</button>
        <button id="openSheetBtn" class="btn-secondary" onclick="openSheet()">📊 Open Last Sheet</button>
        <p class="meta-text" id="generatedTime"></p>
      </div>
    </div>

    <script>
      let selectedFolderId = "";
      let selectedFolderName = "";
      let lastDocUrl = "";
      let lastSheetUrl = "";

      window.onload = function() {
        google.script.run.withSuccessHandler(function(tz) {
          document.getElementById('timezoneLabel').textContent = tz;
        }).getUserTimezone();
      };
      
      function togglePickerUI() {
        const scope = document.querySelector('input[name="scanScope"]:checked').value;
        if (scope === 'specific_folder') {
          document.getElementById('pickerSection').classList.remove('hidden');
        } else {
          document.getElementById('pickerSection').classList.add('hidden');
        }
      }

      function openPickerInit() {
        document.getElementById('chooseFolderBtn').disabled = true;
        document.getElementById('chooseFolderBtn').textContent = "Opening...";
        
        google.script.run
          .withSuccessHandler(function() {
            document.getElementById('chooseFolderBtn').disabled = false;
            document.getElementById('chooseFolderBtn').textContent = "📁 Choose Folder";
            pollForFolderSelection();
          })
          .withFailureHandler(function(err) {
             document.getElementById('chooseFolderBtn').disabled = false;
             document.getElementById('chooseFolderBtn').textContent = "📁 Choose Folder";
             showError("Failed to open picker: " + err.message);
          })
          .showPickerDialog();
      }

      function pollForFolderSelection() {
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.folderId) {
              selectedFolderId = result.folderId;
              selectedFolderName = result.folderName;
              document.getElementById('selectedFolderText').textContent = 'Selected: ' + result.folderName + ' ✓';
            }
          })
          .getSelectedFolder();
      }

      function generateReport() {
        // Collect params
        const scanScope = document.querySelector('input[name="scanScope"]:checked').value;
        
        if (scanScope === 'specific_folder' && !selectedFolderId) {
          showError("Please select a folder first");
          return;
        }

        const params = {
          period: document.getElementById('period').value,
          scanScope: scanScope,
          folderId: selectedFolderId,
          folderName: selectedFolderName,
          outputFormat: document.getElementById('outputFormat').value,
          sessionGap: document.getElementById('sessionGap').value
        };

        // UI transitions
        document.getElementById('generateBtn').disabled = true;
        document.getElementById('loadingState').classList.remove('hidden');
        document.getElementById('successState').classList.add('hidden');
        document.getElementById('errorState').classList.add('hidden');
        document.getElementById('lastReportSection').classList.add('hidden');

        // Call server
        google.script.run
          .withSuccessHandler(onSuccess)
          .withFailureHandler(onFailure)
          .generateReport(params);
      }

      function onSuccess(result) {
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('loadingState').classList.add('hidden');
        
        if (result.error) {
          showError(result.error);
          return;
        }

        document.getElementById('successState').classList.remove('hidden');
        
        lastDocUrl = result.docUrl;
        lastSheetUrl = result.sheetUrl;
        
        const docBtn = document.getElementById('openDocBtn');
        if (lastDocUrl) {
          docBtn.style.display = 'block';
        } else {
          docBtn.style.display = 'none';
        }
        
        const generatedAt = new Date().toLocaleTimeString();
        document.getElementById('generatedTime').textContent = `Generated: ${generatedAt}`;
        document.getElementById('lastReportSection').classList.remove('hidden');
      }

      function onFailure(error) {
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('loadingState').classList.add('hidden');
        showError(error.message || error.toString());
      }
      
      function showError(msg) {
        document.getElementById('errorState').classList.remove('hidden');
        document.getElementById('errorMsg').textContent = msg;
      }

      function openDoc() {
        if (lastDocUrl) window.open(lastDocUrl, '_blank');
      }

      function openSheet() {
        if (lastSheetUrl) window.open(lastSheetUrl, '_blank');
      }
    </script>
  </body>
</html>
