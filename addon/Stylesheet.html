<style>
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Google Sans", Arial, sans-serif;
    background-color: #ffffff;
    color: #3c4043;
    width: 300px; /* Sidebar max context width */
  }

  /* Structural Container */
  .sidebar-container {
    padding: 16px;
    box-sizing: border-box;
  }

  /* Header Styles */
  .header {
    margin-bottom: 24px;
  }
  
  .title {
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 4px 0;
    color: #202124;
  }
  
  .subtitle {
    font-size: 13px;
    color: #5f6368;
  }

  /* Forms & Sections */
  .section {
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
  }
  
  label {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #3c4043;
  }

  .full-width {
    width: 100%;
    box-sizing: border-box;
    padding: 8px 12px;
    font-size: 14px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    margin-bottom: 16px;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .full-width:focus {
    outline: none;
    border-color: #1a73e8;
  }

  /* Button Styles */
  button {
    width: 100%;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: background-color 0.2s;
    box-sizing: border-box;
    display: block;
  }

  .btn-primary {
    background-color: #1a73e8;
    color: #ffffff;
  }

  .btn-primary:hover {
    background-color: #1557b0;
  }

  .btn-primary:disabled {
    background-color: #a8c7fa;
    cursor: not-allowed;
  }

  .btn-secondary {
    background-color: #ffffff;
    color: #1a73e8;
    border: 1px solid #1a73e8;
    margin-bottom: 12px;
  }

  .btn-secondary:hover {
    background-color: #f1f8fe;
  }

  /* Dividers */
  .divider {
    border: 0;
    height: 1px;
    background-color: #dadce0;
    margin: 24px 0;
  }

  /* Typography / Section Titles */
  .section-title {
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 16px 0;
    color: #202124;
  }

  .meta-text {
    font-size: 12px;
    color: #5f6368;
    text-align: center;
    margin: 8px 0 0 0;
  }

  /* Loading & Status States */
  .state-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 0;
    text-align: center;
  }

  .state-container p {
    margin: 12px 0 0 0;
    font-size: 14px;
    color: #3c4043;
  }

  .hidden {
    display: none !important;
  }

  /* Success & Error Colors */
  .success-text {
    color: #34a853 !important;
    font-weight: 500;
  }

  .error-text {
    color: #ea4335 !important;
  }

  .success-icon {
    font-size: 32px;
    color: #34a853;
  }

  /* Spinner Animation CSS */
  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid rgba(26,115,232,0.2);
    border-radius: 50%;
    border-top-color: #1a73e8;
    animation: spin 1s ease-in-out infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Onboarding Overlay */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(255, 255, 255, 0.95);
    z-index: 100;
    padding: 24px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .onboarding-icon {
    font-size: 48px;
    margin-bottom: 20px;
  }

  .onboarding-title {
    font-size: 20px;
    font-weight: 500;
    color: #1a73e8;
    margin-bottom: 16px;
  }

  .onboarding-content {
    font-size: 14px;
    line-height: 1.5;
    color: #3c4043;
    margin-bottom: 24px;
    text-align: left;
  }

  .onboarding-item {
    margin-bottom: 12px;
    display: flex;
    align-items: flex-start;
  }

  .onboarding-item span {
    margin-right: 8px;
  }
</style>
